  function minMax(nums){
    let minMaxObject = {
    min: null,
    max: null, 
  };

    for(let i = 0; i < nums.length; i++){

      if (minMaxObject.min === null || nums[i] < minMaxObject.min) {
        minMaxObject.min = nums[i];
      } 

      if (minMaxObject.max === null || nums[i] > minMaxObject.max) {
        minMaxObject.max = nums[i];
      } 
   
    }
  
    console.log(minMaxObject)
  }

    }
